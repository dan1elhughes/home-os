services:
  transmission:
    image: lscr.io/linuxserver/transmission:4.1.0
    environment:
      - PUID=${PUID?error}
      - PGID=${PGID?error}
    volumes:
      - "/mnt/cephfs/transmission:/config"
      - "downloads:/downloads"
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.transmission.rule=Host(`transmission.danhughes.dev`)"
        - "traefik.http.routers.transmission.entrypoints=websecure"
        - "traefik.http.routers.transmission.tls=true"
        - "traefik.http.routers.transmission.tls.certResolver=letsencrypt"
        - "traefik.http.services.transmission.loadbalancer.server.port=9091"
        - "traefik.swarm.network=main"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    environment:
      - PUID=${PUID?error}
      - PGID=${PGID?error}
      - TZ=${TZ?error}
    volumes:
      - "/mnt/cephfs/prowlarr-config:/config"
    healthcheck:
      test: curl -f http://localhost:9696/ping || exit 1
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.danhughes.dev`)"
        - "traefik.http.routers.prowlarr.entrypoints=websecure"
        - "traefik.http.routers.prowlarr.tls=true"
        - "traefik.http.routers.prowlarr.tls.certResolver=letsencrypt"
        - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
        - "traefik.swarm.network=main"

  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4
    environment:
      - PUID=${PUID?error}
      - PGID=${PGID?error}
      - TZ=${TZ?error}
    volumes:
      - "/mnt/cephfs/radarr-config:/config"
      - "downloads_complete:/downloads/complete"
      - "media_movies:/movies"
    healthcheck:
      test: curl -f http://localhost:7878/ping || exit 1
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.radarr.rule=Host(`radarr.danhughes.dev`)"
        - "traefik.http.routers.radarr.entrypoints=websecure"
        - "traefik.http.routers.radarr.tls=true"
        - "traefik.http.routers.radarr.tls.certResolver=letsencrypt"
        - "traefik.http.services.radarr.loadbalancer.server.port=7878"
        - "traefik.swarm.network=main"

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    environment:
      - PUID=${PUID?error}
      - PGID=${PGID?error}
      - TZ=${TZ?error}
    volumes:
      - "/mnt/cephfs/sonarr-config:/config"
      - "downloads_complete:/downloads/complete"
      - "media_tv:/tv"
    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.sonarr.rule=Host(`sonarr.danhughes.dev`)"
        - "traefik.http.routers.sonarr.entrypoints=websecure"
        - "traefik.http.routers.sonarr.tls=true"
        - "traefik.http.routers.sonarr.tls.certResolver=letsencrypt"
        - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
        - "traefik.swarm.network=main"

  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0
    environment:
      - PUID=${PUID?error}
      - PGID=${PGID?error}
      - TZ=${TZ?error}
    volumes:
      - "/mnt/cephfs/lidarr-config:/config"
      - "downloads_complete:/downloads/complete"
      - "media_music:/music"
    healthcheck:
      test: curl -f http://localhost:8686/ping || exit 1
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.lidarr.rule=Host(`lidarr.danhughes.dev`)"
        - "traefik.http.routers.lidarr.entrypoints=websecure"
        - "traefik.http.routers.lidarr.tls=true"
        - "traefik.http.routers.lidarr.tls.certResolver=letsencrypt"
        - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
        - "traefik.swarm.network=main"

  swiparr:
    image: ghcr.io/m3sserstudi0s/swiparr:1.3.1
    environment:
      - PUID=${PUID?error}
      - PGID=${PGID?error}
      - TZ=${TZ?error}
      - JELLYFIN_URL=http://10.10.10.60:8096
      - JELLYFIN_PUBLIC_URL=https://jellyfin.danhughes.dev
    volumes:
      - "/mnt/cephfs/swiparr:/app/data"
    healthcheck:
      test: curl -f http://localhost:4321/ || exit 1
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.swiparr.rule=Host(`swiparr.danhughes.dev`)"
        - "traefik.http.routers.swiparr.entrypoints=websecure"
        - "traefik.http.routers.swiparr.tls=true"
        - "traefik.http.routers.swiparr.tls.certResolver=letsencrypt"
        - "traefik.http.services.swiparr.loadbalancer.server.port=4321"
        - "traefik.swarm.network=main"

volumes:
  downloads:
    driver_opts:
      type: "nfs"
      o: "addr=10.10.10.60,nfsvers=4"
      device: ":/mnt/SSD/downloads"
  downloads_complete:
    driver_opts:
      type: "nfs"
      o: "addr=10.10.10.60,nfsvers=4"
      device: ":/mnt/SSD/downloads/complete"

  media:
    driver_opts:
      type: "nfs"
      o: "addr=10.10.10.60,nfsvers=4"
      device: ":/mnt/HDD/media"
  media_movies:
    driver_opts:
      type: "nfs"
      o: "addr=10.10.10.60,nfsvers=4"
      device: ":/mnt/HDD/media/movies"
  media_tv:
    driver_opts:
      type: "nfs"
      o: "addr=10.10.10.60,nfsvers=4"
      device: ":/mnt/HDD/media/tv"
  media_music:
    driver_opts:
      type: "nfs"
      o: "addr=10.10.10.60,nfsvers=4"
      device: ":/mnt/HDD/media/music"

networks:
  default:
    external: true
    name: main
