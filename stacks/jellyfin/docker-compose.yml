services:
  jellyfin-proxy:
    image: caddy:2.11.2-alpine
    command: caddy reverse-proxy --from :80 --to http://10.10.10.60:8096
    deploy:
      labels:
        - "traefik.enable=true"

        - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.danhughes.dev`)"
        - "traefik.http.routers.jellyfin.entrypoints=websecure"
        - "traefik.http.routers.jellyfin.tls=true"
        - "traefik.http.routers.jellyfin.tls.certResolver=letsencrypt"

        - "traefik.http.services.jellyfin.loadbalancer.server.port=80"
        - "traefik.swarm.network=main"

networks:
  default:
    external: true
    name: main
