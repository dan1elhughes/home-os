services:
  netboot-proxy:
    image: caddy:2.11.2-alpine
    command: caddy reverse-proxy --from :80 --to http://10.10.10.60:31010
    deploy:
      labels:
        - "traefik.enable=true"

        - "traefik.http.routers.netboot.rule=Host(`netboot.danhughes.dev`)"
        - "traefik.http.routers.netboot.entrypoints=websecure"
        - "traefik.http.routers.netboot.tls=true"
        - "traefik.http.routers.netboot.tls.certResolver=letsencrypt"

        - "traefik.http.services.netboot.loadbalancer.server.port=80"
        - "traefik.swarm.network=main"

networks:
  default:
    external: true
    name: main
