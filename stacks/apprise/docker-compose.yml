services:
  apprise:
    image: lscr.io/linuxserver/apprise-api:1.3.1
    environment:
      - PUID=${PUID?error}
      - PGID=${PGID?error}
      - TZ=${TZ?error}
      - APPRISE_ATTACH_SIZE=10 # in Mb
    volumes:
      - "/mnt/cephfs/apprise-config:/config"
      - "/mnt/cephfs/apprise-attachments:/attachments"
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.apprise.rule=Host(`apprise.danhughes.dev`)"
        - "traefik.http.routers.apprise.entrypoints=websecure"
        - "traefik.http.routers.apprise.tls=true"
        - "traefik.http.routers.apprise.tls.certResolver=letsencrypt"
        - "traefik.http.services.apprise.loadbalancer.server.port=8000"
        - "traefik.swarm.network=main"

networks:
  default:
    external: true
    name: main
